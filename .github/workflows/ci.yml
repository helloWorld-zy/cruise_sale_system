name: Cruise Booking System CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Test with Coverage
      run: |
        go test -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out
        # In a real script we would enforce 100% here, e.g.:
        # COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
        # if (( $(echo "$COVERAGE < 100" | bc -l) )); then echo "Coverage below 100%"; exit 1; fi

  frontend-admin-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - run: npm ci
    - run: npm test -- --coverage

  frontend-web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - run: npm ci
    - run: npm test -- --coverage
