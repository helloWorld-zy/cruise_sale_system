    get:
      parameters:
      - description: Cabin SKU ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Get cabin sku detail
      tags:
      - Cabin
    put:
      consumes:
      - application/json
      parameters:
      - description: Cabin SKU ID
        in: path
        name: id
        required: true
        type: integer
      - description: Cabin SKU payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cruisebooking_backend_internal_domain.CabinSKU'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
