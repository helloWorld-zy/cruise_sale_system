basePath: /api/v1
definitions:
  gin.H:
    additionalProperties: {}
    type: object
  github_com_cruisebooking_backend_internal_domain.CabinPrice:
    properties:
      cabin_sku_id:
        description: 关联的舱房 SKU ID
        type: integer
      child_price_cents:
        description: 儿童价格（分）
        type: integer
      created_at:
        description: 创建时间
        type: string
      date:
        description: 价格生效日期
        type: string
      id:
        description: 主键 ID
        type: integer
      occupancy:
        description: 入住人数
        type: integer
      price_cents:
        description: 基础价格（分）
        type: integer
      price_type:
        description: 价格类型：base/child/single_supplement/holiday/early_bird
        type: string
      single_supplement_cents:
        description: 单人补差价（分）
        type: integer
      updated_at:
        description: 更新时间
        type: string
    type: object
  github_com_cruisebooking_backend_internal_domain.CabinSKU:
    properties:
      amenities:
        description: 附属设施（逗号分隔）
        type: string
      area:
        description: 舱房面积（平方米）
        type: number
      bed_type:
        description: 床型说明
        type: string
      cabin_type_id:
        description: 所属舱房类型 ID
        type: integer
      code:
        description: 舱房编号，全局唯一
        type: string
      created_at:
        description: 创建时间
        type: string
      deck:
        description: 所在甲板层
        type: string
      grade:
        description: 舱位等级：standard/premium/deluxe
        type: string
      has_balcony:
        description: 是否有阳台
        type: boolean
      has_window:
        description: 是否有窗
        type: boolean
      id:
        description: 主键 ID
        type: integer
      max_guests:
        description: 最大入住人数
        type: integer
      orientation:
        description: 朝向：port/starboard
        type: string
      position:
        description: 位置：fore/mid/aft
        type: string
      status:
        description: 状态：1=上架，0=下架
        type: integer
      updated_at:
        description: 更新时间
        type: string
      voyage_id:
        description: 所属航次 ID
        type: integer
    type: object
  github_com_cruisebooking_backend_internal_pkg_response.Response:
    properties:
      code:
        description: 业务状态码（0 表示成功）
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        type: string
    type: object
  internal_handler.CabinAdjustInventoryRequest:
    properties:
      delta:
        description: 调整量（正数增加，负数减少）
        type: integer
      reason:
        description: 调整原因
        type: string
    required:
    - delta
    - reason
    type: object
  internal_handler.CabinAlertThresholdRequest:
    properties:
      threshold:
        description: 预警阈值
        type: integer
    type: object
  internal_handler.CabinBatchStatusRequest:
    properties:
      ids:
        description: 舱位 ID 列表
        items:
          type: integer
        type: array
      status:
        description: 目标状态
        type: integer
    required:
    - ids
    type: object
  internal_handler.CabinTypeBatchCreateRequest:
    properties:
      amenities:
        description: 设施清单
        type: string
      area:
        description: 面积（平方米）
        type: number
      area_max:
        description: 最大面积
        type: number
      area_min:
        description: 最小面积
        type: number
      bed_type:
        description: 床型说明
        type: string
      capacity:
        description: 容纳人数
        type: integer
      category_id:
        description: 舱型大类 ID
        type: integer
      code:
        description: 舱房类型代码
        type: string
      cruise_id:
        description: 所属邮轮 ID
        type: integer
      cruise_ids:
        items:
          type: integer
        type: array
      deck:
        description: 所在甲板
        type: string
      description:
        description: 描述
        type: string
      english_name:
        description: 英文名称
        type: string
      floor_plan_url:
        description: 平面图 URL
        type: string
      intro:
        description: 简介
        type: string
      max_capacity:
        description: 最大容纳人数
        type: integer
      name:
        description: 舱房类型名称
        type: string
      occupancy:
        description: 默认入住人数
        type: integer
      sort_order:
        description: 排序权重
        type: integer
      tags:
        description: 特色标签
        type: string
    required:
    - cruise_id
    - cruise_ids
    - name
    type: object
  internal_handler.CabinTypeRequest:
    properties:
      amenities:
        description: 设施清单
        type: string
      area:
        description: 面积（平方米）
        type: number
      area_max:
        description: 最大面积
        type: number
      area_min:
        description: 最小面积
        type: number
      bed_type:
        description: 床型说明
        type: string
      capacity:
        description: 容纳人数
        type: integer
      category_id:
        description: 舱型大类 ID
        type: integer
      code:
        description: 舱房类型代码
        type: string
      cruise_id:
        description: 所属邮轮 ID
        type: integer
      deck:
        description: 所在甲板
        type: string
      description:
        description: 描述
        type: string
      english_name:
        description: 英文名称
        type: string
      floor_plan_url:
        description: 平面图 URL
        type: string
      intro:
        description: 简介
        type: string
      max_capacity:
        description: 最大容纳人数
        type: integer
      name:
        description: 舱房类型名称
        type: string
      occupancy:
        description: 默认入住人数
        type: integer
      sort_order:
        description: 排序权重
        type: integer
      tags:
        description: 特色标签
        type: string
    required:
    - cruise_id
    - name
    type: object
  internal_handler.CompanyRequest:
    properties:
      description:
        description: 公司描述
        type: string
      english_name:
        description: 英文名称
        type: string
      logo_url:
        description: Logo 图片地址
        type: string
      name:
        description: 公司名称（必填）
        type: string
      sort_order:
        description: 排序权重
        type: integer
    required:
    - name
    type: object
  internal_handler.CruiseBatchStatusRequest:
    properties:
      ids:
        description: 需要更新状态的邮轮 ID 列表
        items:
          type: integer
        type: array
      status:
        description: 目标状态
        type: integer
    required:
    - ids
    type: object
  internal_handler.CruiseRequest:
    properties:
      build_year:
        description: 建造年份
        type: integer
      code:
        description: 邮轮代码/英文简称
        type: string
      company_id:
        description: 所属公司 ID（必填）
        type: integer
      crew_count:
        description: 船员人数
        type: integer
      deck_count:
        description: 甲板层数
        type: integer
      description:
        description: 描述
        type: string
      english_name:
        description: 英文名称
        type: string
      length:
        description: 船体长度（米）
        type: number
      name:
        description: 邮轮名称（必填）
        type: string
      passenger_capacity:
        description: 最大载客量
        type: integer
      refurbish_year:
        description: 最近翻新年份
        type: integer
      room_count:
        description: 舱房总数
        type: integer
      sort_order:
        description: 排序权重
        type: integer
      tonnage:
        description: 吨位
        type: number
      width:
        description: 船体宽度（米）
        type: number
    required:
    - company_id
    - name
    type: object
  internal_handler.FacilityCategoryRequest:
    properties:
      icon:
        description: 分类图标
        type: string
      name:
        description: 分类名称（必填）
        type: string
      sort_order:
        description: 排序权重
        type: integer
      status:
        description: 分类状态
        type: integer
    required:
    - name
    type: object
  internal_handler.FacilityRequest:
    properties:
      category_id:
        description: 设施分类 ID（必填）
        type: integer
      charge_price_tip:
        description: 收费提示
        type: string
      cruise_id:
        description: 所属邮轮 ID（必填）
        type: integer
      description:
        description: 设施描述
        type: string
      english_name:
        description: 英文名称
        type: string
      extra_charge:
        description: 是否额外收费
        type: boolean
      location:
        description: 设施位置
        type: string
      name:
        description: 设施名称（必填）
        type: string
      open_hours:
        description: 开放时间
        type: string
      sort_order:
        description: 排序权重
        type: integer
      status:
        description: 状态
        type: integer
      target_audience:
        description: 适合人群
        type: string
    required:
    - category_id
    - cruise_id
    - name
    type: object
  internal_handler.ImageItemRequest:
    properties:
      is_primary:
        description: 是否主图
        type: boolean
      sort_order:
        description: 排序
        type: integer
      url:
        description: 图片地址
        type: string
    required:
    - url
    type: object
  internal_handler.LoginRequest:
    properties:
      password:
        description: 登录密码
        type: string
      username:
        description: 登录用户名
        type: string
    required:
    - password
    - username
    type: object
  internal_handler.LoginResponse:
    properties:
      expire_at:
        description: 令牌过期时间
        type: string
      token:
        description: JWT 令牌字符串
        type: string
    type: object
  internal_handler.SaveImagesRequest:
    properties:
      entity_id:
        description: 实体 ID
        type: integer
      entity_type:
        description: 实体类型
        type: string
      images:
        description: 图片列表
        items:
          $ref: '#/definitions/internal_handler.ImageItemRequest'
        type: array
    required:
    - entity_id
    - entity_type
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend API for CruiseBooking
  title: CruiseBooking API
  version: "1.0"
paths:
  /api/v1/admin/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      summary: Admin login
      tags:
      - Auth
  /api/v1/admin/auth/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Get current staff profile
      tags:
      - Auth
  /api/v1/admin/cabin-types:
    get:
      parameters:
      - description: Cruise ID
        in: query
        name: cruise_id
        required: true
        type: integer
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: List cabin types by cruise
      tags:
      - CabinType
    post:
      consumes:
      - application/json
      parameters:
      - description: Cabin type data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CabinTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Create a cabin type
      tags:
      - CabinType
  /api/v1/admin/cabin-types/{id}:
    delete:
      parameters:
      - description: CabinType ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Delete a cabin type
      tags:
      - CabinType
    get:
      parameters:
      - description: CabinType ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Get a cabin type
      tags:
      - CabinType
    put:
      consumes:
      - application/json
      parameters:
      - description: CabinType ID
        in: path
        name: id
        required: true
        type: integer
      - description: Cabin type data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CabinTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update a cabin type
      tags:
      - CabinType
  /api/v1/admin/cabin-types/batch-create:
    post:
      consumes:
      - application/json
      parameters:
      - description: Batch create cabin type payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CabinTypeBatchCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Batch create cabin types by cruises
      tags:
      - CabinType
  /api/v1/admin/cabins:
    get:
      parameters:
      - description: Voyage ID
        in: query
        name: voyage_id
        type: integer
      - description: Cabin type ID
        in: query
        name: cabin_type_id
        type: integer
      - description: Status, 0 means all
        in: query
        name: status
        type: integer
      - description: Keyword
        in: query
        name: keyword
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cruisebooking_backend_internal_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Filter cabin sku list
      tags:
      - Cabin
    post:
      consumes:
      - application/json
      parameters:
      - description: Cabin SKU payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cruisebooking_backend_internal_domain.CabinSKU'
